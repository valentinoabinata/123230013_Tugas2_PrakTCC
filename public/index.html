<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aplikasi Catatan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      color: #2d3748;
      margin-bottom: 2rem;
      font-size: 2rem;
    }

    .container { max-width: 800px; margin: 0 auto; }

    /* Form Card */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 2rem;
    }

    .card h2 { color: #4a5568; margin-bottom: 1rem; font-size: 1.1rem; }

    input, textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      outline: none;
      transition: border 0.2s;
    }
    input:focus, textarea:focus { border-color: #667eea; }
    textarea { resize: vertical; min-height: 100px; }

    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }

    .btn-primary { background: #667eea; color: #fff; }
    .btn-warning { background: #ed8936; color: #fff; }
    .btn-danger  { background: #e53e3e; color: #fff; }
    .btn-secondary { background: #a0aec0; color: #fff; }

    /* Notes list */
    #catatan-list { display: flex; flex-direction: column; gap: 1rem; }

    .note-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid #667eea;
    }

    .note-card h3 { color: #2d3748; margin-bottom: 0.3rem; }
    .note-card p  { color: #718096; font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.6rem; }
    .note-meta    { font-size: 0.8rem; color: #a0aec0; margin-bottom: 0.75rem; }
    .note-actions { display: flex; gap: 0.5rem; }

    .msg {
      text-align: center;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.success { background: #c6f6d5; color: #276749; display: block; }
    .msg.error   { background: #fed7d7; color: #9b2c2c; display: block; }

    .empty { text-align: center; color: #a0aec0; padding: 2rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Aplikasi Catatan</h1>

    <!-- Pesan notifikasi -->
    <div id="msg" class="msg"></div>

    <!-- Form tambah/edit -->
    <div class="card">
      <h2 id="form-title">➕ Tambah Catatan Baru</h2>
      <input  type="hidden" id="edit-id" />
      <input  type="text"   id="input-judul" placeholder="Judul catatan..." />
      <textarea             id="input-isi"   placeholder="Isi catatan..."></textarea>
      <div class="btn-row">
        <button class="btn-primary"   onclick="submitForm()">Simpan</button>
        <button class="btn-secondary" onclick="resetForm()" id="btn-cancel" style="display:none">Batal</button>
      </div>
    </div>

    <!-- Daftar catatan -->
    <div id="catatan-list">
      <div class="empty">Memuat catatan...</div>
    </div>
  </div>

  <script>
    const API = '/api/v1/catatan';

    // LOAD semua catatan
    async function loadCatatan() {
      try {
        const res  = await fetch(API);
        const json = await res.json();
        renderList(json.data || []);
      } catch (e) {
        showMsg('Gagal memuat catatan: ' + e.message, 'error');
      }
    }

    function renderList(catatan) {
      const list = document.getElementById('catatan-list');
      if (!catatan.length) {
        list.innerHTML = '<div class="empty">Belum ada catatan. Tambahkan sekarang!</div>';
        return;
      }
      list.innerHTML = catatan.map(c => `
        <div class="note-card" id="note-${c.id}">
          <h3>${escHtml(c.judul)}</h3>
          <p>${escHtml(c.isi)}</p>
          <div class="note-meta">🕒 ${formatDate(c.tanggal_dibuat)}</div>
          <div class="note-actions">
            <button class="btn-warning" onclick="editCatatan(${c.id})">✏️ Edit</button>
            <button class="btn-danger"  onclick="deleteCatatan(${c.id})">🗑️ Hapus</button>
          </div>
        </div>
      `).join('');
    }

    // SUBMIT (tambah atau update)
    async function submitForm() {
      const id    = document.getElementById('edit-id').value;
      const judul = document.getElementById('input-judul').value.trim();
      const isi   = document.getElementById('input-isi').value.trim();

      if (!judul || !isi) { showMsg('Judul dan isi tidak boleh kosong!', 'error'); return; }

      const body   = JSON.stringify({ judul, isi });
      const url    = id ? `${API}/${id}` : API;
      const method = id ? 'PUT' : 'POST';

      try {
        const res  = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body });
        const json = await res.json();
        if (res.ok) {
          showMsg(id ? 'Catatan berhasil diperbarui!' : 'Catatan berhasil ditambahkan!', 'success');
          resetForm();
          loadCatatan();
        } else {
          showMsg(json.message || 'Terjadi kesalahan', 'error');
        }
      } catch (e) {
        showMsg('Gagal menyimpan: ' + e.message, 'error');
      }
    }

    // EDIT
    async function editCatatan(id) {
      try {
        const res  = await fetch(`${API}/${id}`);
        const json = await res.json();
        const c    = json.data;
        document.getElementById('edit-id').value      = c.id;
        document.getElementById('input-judul').value  = c.judul;
        document.getElementById('input-isi').value    = c.isi;
        document.getElementById('form-title').textContent = '✏️ Edit Catatan';
        document.getElementById('btn-cancel').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (e) {
        showMsg('Gagal memuat data: ' + e.message, 'error');
      }
    }

    // DELETE
    async function deleteCatatan(id) {
      if (!confirm('Yakin ingin menghapus catatan ini?')) return;
      try {
        const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
        if (res.ok) { showMsg('Catatan dihapus.', 'success'); loadCatatan(); }
        else showMsg('Gagal menghapus catatan.', 'error');
      } catch (e) {
        showMsg('Error: ' + e.message, 'error');
      }
    }

    // HELPERS
    function resetForm() {
      document.getElementById('edit-id').value     = '';
      document.getElementById('input-judul').value = '';
      document.getElementById('input-isi').value   = '';
      document.getElementById('form-title').textContent = '➕ Tambah Catatan Baru';
      document.getElementById('btn-cancel').style.display = 'none';
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent  = text;
      el.className    = 'msg ' + type;
      setTimeout(() => { el.className = 'msg'; }, 3000);
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(d) {
      if (!d) return '-';
      return new Date(d).toLocaleString('id-ID', {
        day:'2-digit', month:'long', year:'numeric',
        hour:'2-digit', minute:'2-digit'
      });
    }

    // Mulai load
    loadCatatan();
  </script>
</body>
</html>
